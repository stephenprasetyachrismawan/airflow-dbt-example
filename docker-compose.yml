version: '3.9'

x-airflow-common: &airflow-common
  image: apache/airflow:2.8.0-python3.10
  environment:
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__MAX_ACTIVE_RUNS_PER_DAG: 1
    AIRFLOW__WEBSERVER__SECRET_KEY: 'healthcare_secret_key_2024'
    AIRFLOW_HOME: /opt/airflow
    PYTHONPATH: /opt/airflow
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./dbt:/opt/airflow/dbt
    - ./data:/opt/airflow/data
    - ./duckdb:/opt/airflow/duckdb
    - airflow_logs:/opt/airflow/logs
  networks:
    - healthcare_network
  depends_on:
    postgres:
      condition: service_healthy

services:
  # PostgreSQL untuk Airflow metadata database
  postgres:
    image: postgres:15-alpine
    container_name: healthcare_postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - healthcare_network

  # Airflow Init - jalankan db init dan buat user admin
  airflow-init:
    <<: *airflow-common
    container_name: healthcare_airflow_init
    entrypoint: bash -c "
      pip install duckdb dbt-duckdb pandas faker --quiet &&
      airflow db init &&
      airflow users create
        --username admin
        --password admin
        --firstname Admin
        --lastname User
        --role Admin
        --email admin@healthcare.local
      "
    restart: "no"

  # Apache Airflow Webserver
  airflow-webserver:
    <<: *airflow-common
    container_name: healthcare_airflow_webserver
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    entrypoint: bash -c "pip install duckdb dbt-duckdb pandas faker --quiet && airflow webserver"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Apache Airflow Scheduler
  airflow-scheduler:
    <<: *airflow-common
    container_name: healthcare_airflow_scheduler
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    entrypoint: bash -c "pip install duckdb dbt-duckdb pandas faker --quiet && airflow scheduler"

  # dbt Docs Server
  dbt-docs:
    <<: *airflow-common
    container_name: healthcare_dbt_docs
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8081:8081"
    entrypoint: bash -c "pip install duckdb dbt-duckdb --quiet && cd /opt/airflow/dbt && /home/airflow/.local/bin/dbt docs serve --port 8081 --host 0.0.0.0 --profiles-dir ."
    restart: unless-stopped

volumes:
  postgres_data:
  airflow_logs:

networks:
  healthcare_network:
    driver: bridge
