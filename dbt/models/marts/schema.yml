version: 2

models:
  - name: dim_tanggal
    description: "Dimensi tanggal kalender 2020-2027 — SCD Type 0"
    columns:
      - name: tanggal_key
        tests: [unique, not_null]
      - name: tanggal
        tests: [unique]

  - name: dim_pasien
    description: "Dimensi pasien dengan SCD Type 2"
    columns:
      - name: pasien_key
        tests: [unique, not_null]
      - name: pat_id
        tests: [not_null]

  - name: dim_dokter
    description: "Dimensi dokter (filter ROLE_DES=Doctor) — SCD Type 2"
    columns:
      - name: dokter_key
        tests: [unique, not_null]
      - name: stf_id
        tests: [not_null]

  - name: dim_departemen
    description: "Dimensi departemen — SCD Type 1"
    columns:
      - name: departemen_key
        tests: [unique, not_null]
      - name: dep_id
        tests: [unique, not_null]
      - name: nama_departemen
        tests: [not_null]

  - name: dim_ruangan
    description: "Dimensi ruangan — SCD Type 1"
    columns:
      - name: ruangan_key
        tests: [unique, not_null]
      - name: rom_id
        tests: [unique, not_null]

  - name: fct_kunjungan
    description: "Fact table kunjungan pasien — grain: 1 baris per kunjungan"
    columns:
      - name: kunjungan_key
        tests: [unique, not_null]
      - name: refr_no
        tests: [not_null]
      - name: pasien_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_pasien')
              field: pasien_key
      - name: dokter_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_dokter')
              field: dokter_key
      - name: ruangan_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_ruangan')
              field: ruangan_key
      - name: departemen_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_departemen')
              field: departemen_key
      - name: tanggal_masuk_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_tanggal')
              field: tanggal_key

  - name: fct_diagnosis
    description: "Fact table diagnosis — grain: 1 baris per diagnosis per kunjungan"
    columns:
      - name: diagnosis_key
        tests: [unique, not_null]
      - name: refr_no
        tests: [not_null]
      - name: pasien_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_pasien')
              field: pasien_key
      - name: dokter_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_dokter')
              field: dokter_key
      - name: tanggal_diagnosis_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_tanggal')
              field: tanggal_key

  - name: fct_tindakan_medis
    description: "Fact table tindakan medis — grain: 1 baris per tindakan per kunjungan"
    columns:
      - name: tindakan_key
        tests: [unique, not_null]
      - name: refr_no
        tests: [not_null]
      - name: pasien_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_pasien')
              field: pasien_key
      - name: tanggal_tindakan_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_tanggal')
              field: tanggal_key
