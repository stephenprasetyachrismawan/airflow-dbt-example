version: 2

sources:
  - name: raw_kaggle
    schema: raw
    description: "Kaggle Healthcare Dataset — EHP Staging Tables"
    tables:
      - name: stg_ehp__patn
        description: "Master data pasien"
      - name: stg_ehp__vist
        description: "Data kunjungan pasien"
      - name: stg_ehp__appt
        description: "Data appointment / jadwal"
      - name: stg_ehp__diag
        description: "Data diagnosis (UNION dari DIAG_1 + DIAG_2)"
      - name: stg_ehp__trtm
        description: "Data tindakan medis / treatment"
      - name: stg_ehp__stff
        description: "Master staff (filter ROLE_DES = Doctor untuk dim_dokter)"
      - name: stg_ehp__dpmt
        description: "Master departemen"
      - name: stg_ehp__roms
        description: "Master ruangan"
      - name: stg_ehp__medt
        description: "Medical team — bridge MEDT_ID ke STF_ID"
      - name: stg_ehp__insr
        description: "Data asuransi pasien — enrich dim_pasien saja"
