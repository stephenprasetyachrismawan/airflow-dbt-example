
# Name your project! Project names should be lowercase and use underscores as separators
# See documentation: https://docs.getdbt.com/docs/configure-your-project

name: 'healthcare_dw'
version: '1.0.0'
config-version: 2

# This setting configures which "profile" dbt uses for this project.
profile: 'healthcare'

model-paths: ["models"]
analysis-paths: ["analysis"]
test-paths: ["tests"]
seed-paths: ["data"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"  # directory which will store compiled SQL files
clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"

# Configuring models
# Full documentation: https://docs.getdbt.com/docs/configuring-models

models:
  healthcare_dw:
    staging:
      +materialized: view
      +schema: staging
      +tags:
        - 'staging'

    intermediate:
      +materialized: view
      +schema: intermediate
      +tags:
        - 'intermediate'

    marts:
      +materialized: table
      +schema: marts
      +tags:
        - 'marts'

# Seed configurations
seeds:
  +schema: seeds

